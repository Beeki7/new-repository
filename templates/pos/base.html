<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Storebase POS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-100 text-slate-900">
<div class="min-h-screen flex flex-col">
    <header class="bg-indigo-600 text-white shadow">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="font-semibold text-lg tracking-tight">
                Storebase POS
            </div>
            <nav class="flex gap-2 text-sm sm:text-base">
                <a href="{% url 'dashboard' %}" class="px-3 py-2 rounded-md hover:bg-indigo-500 transition">Dashboard</a>
                <a href="{% url 'product_list' %}" class="px-3 py-2 rounded-md hover:bg-indigo-500 transition">Products</a>
                <a href="{% url 'checkout' %}" class="px-3 py-2 rounded-md bg-white text-indigo-700 font-semibold hover:bg-slate-100 transition">Checkout</a>
            </nav>
        </div>
    </header>

    <main class="flex-1">
        <div class="max-w-5xl mx-auto px-4 py-6">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="border-t bg-white">
        <div class="max-w-5xl mx-auto px-4 py-3 text-xs text-slate-500 flex justify-between">
            <span>Simple POS for boutiques</span>
            <span>{% now "Y-m-d H:i" %}</span>
        </div>
    </footer>
</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
